services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cell_ulagam_app
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
    env_file:
      - .env
    volumes:
      - app_storage:/var/www/storage
      - app_bootstrap_cache:/var/www/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cell_ulagam_net

  nginx:
    image: nginx:1.25-alpine
    container_name: cell_ulagam_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
      - app_storage:/var/www/storage:ro
      - ssl_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - cell_ulagam_net

  mysql:
    image: mysql:8.0
    container_name: cell_ulagam_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cell_ulagam}
      MYSQL_USER: ${DB_USERNAME:-cell_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cell_ulagam_net

volumes:
  mysql_data:
  app_storage:
  app_bootstrap_cache:
  ssl_certs:

networks:
  cell_ulagam_net:
    driver: bridge
